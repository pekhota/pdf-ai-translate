name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  quality:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dev dependencies
        run: npm install

      - name: ESLint
        run: npm run lint

      - name: Validate manifest.json
        run: npm run validate

      - name: Check src/ and pdfjs/web/ overlays are in sync
        run: |
          if ! diff -q src/translate-overlay.js pdfjs/web/translate-overlay.js > /dev/null; then
            echo "ERROR: src/translate-overlay.js and pdfjs/web/translate-overlay.js are out of sync."
            diff src/translate-overlay.js pdfjs/web/translate-overlay.js
            exit 1
          fi
          echo "OK: overlay files are in sync."

      - name: Audit dependencies for vulnerabilities
        run: npm audit --audit-level=high

  build:
    name: Build Extension Artifact
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Pack extension
        run: |
          zip -r extension.zip . \
            --exclude "*.git*" \
            --exclude "node_modules/*" \
            --exclude ".github/*" \
            --exclude "*.map" \
            --exclude "scripts/*" \
            --exclude "setup.js" \
            --exclude "eslint.config.js" \
            --exclude "package*.json" \
            --exclude "pdfjs/web/compressed.tracemonkey-pldi-09.pdf"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-ai-translate
          path: extension.zip
          retention-days: 30

  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can scan every commit

      - name: Gitleaks — scan for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
